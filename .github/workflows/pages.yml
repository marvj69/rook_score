name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build assets
        run: npm run build

      - name: Prepare Pages artifact
        run: |
          mkdir -p _pages/css _pages/icons _pages/js _pages/vendor
          cp index.html manifest.json service-worker.js _pages/
          cp css/app.css css/tailwind.css _pages/css/
          cp icons/icon-192x192.png icons/icon-512x512.png _pages/icons/
          cp js/analytics.js js/app.bundle.js js/app.js js/firebase-init.js js/model_runtime_v1.json _pages/js/
          cp vendor/canvas-confetti.min.js _pages/vendor/
          touch _pages/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _pages

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy artifact
        id: deployment
        uses: actions/deploy-pages@v4
